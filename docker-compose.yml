services:
  backend:
    image: buffotte-backend
    restart: always
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8002:8000"
    environment:
      - HOST=host.docker.internal
      - BUFFTRACKER_URL=http://host.docker.internal:8001
    env_file:
      - ./.env
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    image: buffotte-frontend
    restart: always
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "4000:80"
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
